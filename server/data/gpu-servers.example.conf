# GPU Server Configuration
# Format: group role name ip user port [ssh_target]
# Lines starting with # are comments. Empty lines are ignored.
#
# Fields:
#   group       - Cluster/group identifier
#   role        - Server role (master, worker, etc.)
#   name        - Full machine name
#   ip          - IP address
#   user        - SSH username
#   port        - SSH port
#   ssh_target  - (optional) SSH config alias; defaults to user@ip
#
# Example:
# my-cluster master my-cluster-master-0 10.0.0.1 root 22 my-cluster-master-0
# my-cluster worker my-cluster-worker-0 10.0.0.2 root 22 my-cluster-worker-0
# my-cluster worker my-cluster-worker-1 10.0.0.3 root 22 my-cluster-worker-1
